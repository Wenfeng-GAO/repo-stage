<svg width="1100" height="250" viewBox="0 0 1100 250" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">RepoStage generation workflow</title>
  <desc id="desc">A public GitHub repo is ingested, profiled, converted into a site, and validated with reports.</desc>
  <defs>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F8FAFC"/>
    </linearGradient>
  </defs>
  <rect width="1100" height="250" rx="22" fill="#F1F5F9"/>
  <g font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">
    <g>
      <rect x="42" y="48" width="206" height="154" rx="18" fill="url(#card)" stroke="#CBD5E1"/>
      <circle cx="78" cy="84" r="16" fill="#0F766E"/>
      <text x="78" y="90" text-anchor="middle" font-size="18" font-weight="800" fill="white">1</text>
      <text x="62" y="122" font-size="22" font-weight="800" fill="#0F172A">Ingest</text>
      <text x="62" y="154" font-size="15" font-weight="520" fill="#475569">README, docs, metadata,</text>
      <text x="62" y="176" font-size="15" font-weight="520" fill="#475569">license, examples, assets</text>
    </g>
    <path d="M268 125H328" stroke="#64748B" stroke-width="4" stroke-linecap="round"/>
    <path d="M314 111L330 125L314 139" stroke="#64748B" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <g>
      <rect x="350" y="48" width="206" height="154" rx="18" fill="url(#card)" stroke="#CBD5E1"/>
      <circle cx="386" cy="84" r="16" fill="#0F766E"/>
      <text x="386" y="90" text-anchor="middle" font-size="18" font-weight="800" fill="white">2</text>
      <text x="370" y="122" font-size="22" font-weight="800" fill="#0F172A">Profile</text>
      <text x="370" y="154" font-size="15" font-weight="520" fill="#475569">Extract sourced facts and</text>
      <text x="370" y="176" font-size="15" font-weight="520" fill="#475569">record missing content gaps</text>
    </g>
    <path d="M576 125H636" stroke="#64748B" stroke-width="4" stroke-linecap="round"/>
    <path d="M622 111L638 125L622 139" stroke="#64748B" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <g>
      <rect x="658" y="48" width="206" height="154" rx="18" fill="url(#card)" stroke="#CBD5E1"/>
      <circle cx="694" cy="84" r="16" fill="#0F766E"/>
      <text x="694" y="90" text-anchor="middle" font-size="18" font-weight="800" fill="white">3</text>
      <text x="678" y="122" font-size="22" font-weight="800" fill="#0F172A">Generate</text>
      <text x="678" y="154" font-size="15" font-weight="520" fill="#475569">Write a static, portable</text>
      <text x="678" y="176" font-size="15" font-weight="520" fill="#475569">one-page project website</text>
    </g>
    <path d="M884 125H944" stroke="#64748B" stroke-width="4" stroke-linecap="round"/>
    <path d="M930 111L946 125L930 139" stroke="#64748B" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <g>
      <rect x="966" y="48" width="92" height="154" rx="18" fill="#0F172A"/>
      <text x="1012" y="104" text-anchor="middle" font-size="18" font-weight="800" fill="#A7F3D0">QA</text>
      <text x="1012" y="136" text-anchor="middle" font-size="14" font-weight="650" fill="#E2E8F0">reports</text>
      <text x="1012" y="160" text-anchor="middle" font-size="14" font-weight="650" fill="#E2E8F0">and site</text>
    </g>
  </g>
</svg>
